<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Blue rounded background -->
  <rect width="32" height="32" rx="7" fill="#2563eb"/>
  <!-- Bus body -->
  <rect x="4" y="10" width="24" height="14" rx="2" fill="white"/>
  <!-- Windshield -->
  <rect x="18" y="12" width="8" height="5" rx="1" fill="#93c5fd"/>
  <!-- Side windows -->
  <rect x="6" y="12" width="5" height="4" rx="1" fill="#93c5fd"/>
  <rect x="12" y="12" width="5" height="4" rx="1" fill="#93c5fd"/>
  <!-- Door line -->
  <rect x="6" y="17" width="3" height="5" rx="0.5" fill="#bfdbfe"/>
  <!-- Front bumper -->
  <rect x="26" y="18" width="2" height="3" rx="1" fill="#1d4ed8"/>
  <!-- Wheels -->
  <circle cx="9" cy="25" r="3" fill="#1e3a5f"/>
  <circle cx="9" cy="25" r="1.5" fill="#60a5fa"/>
  <circle cx="22" cy="25" r="3" fill="#1e3a5f"/>
  <circle cx="22" cy="25" r="1.5" fill="#60a5fa"/>
  <!-- Roof stripe -->
  <rect x="4" y="10" width="24" height="2" rx="1" fill="#1d4ed8"/>
  <!-- Headlight -->
  <rect x="26" y="13" width="2" height="2" rx="0.5" fill="#fbbf24"/>
</svg>
