services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: transporte_escolar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--locale-provider=libc --lc-collate=C --lc-ctype=C"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=db;Database=transporte_escolar;Username=postgres;Password=postgres"
      Jwt__Key: "super-secret-key-change-in-production-min-32-chars"
      Jwt__Issuer: "TransporteEscolar"
      Jwt__Audience: "TransporteEscolar"
      Jwt__ExpiresHours: "8"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./FrontEnd
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
